      <rect x="125" y="14" width="30" height="30" rx="8" fill="#6748d8"/>
      <text x="140" y="35" text-anchor="middle" font-size="12" font-weight="800" fill="#ffffff">LLM</text>
      <text x="125" y="61" font-size="14" font-weight="700" fill="#4f398f">生成</text>

      <path d="M201 39 H213" stroke="#819bc7" stroke-width="3" stroke-linecap="round"/>
      <path d="M208 33 L215 39 L208 45" fill="none" stroke="#819bc7" stroke-width="3" stroke-linecap="round"/>

      <rect x="220" y="0" width="84" height="78" rx="14" fill="#eaf9f7" stroke="#9cded5"/>
      <rect x="235" y="14" width="30" height="30" rx="8" fill="#0b9297"/>
      <text x="250" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">FX</text>
      <text x="235" y="61" font-size="14" font-weight="700" fill="#17666d">变异</text>

      <path d="M311 39 H323" stroke="#819bc7" stroke-width="3" stroke-linecap="round"/>
      <path d="M318 33 L325 39 L318 45" fill="none" stroke="#819bc7" stroke-width="3" stroke-linecap="round"/>

      <rect x="330" y="0" width="84" height="78" rx="14" fill="#fff3e5" stroke="#efc27f"/>
      <rect x="345" y="14" width="30" height="30" rx="8" fill="#d58a23"/>
      <text x="360" y="35" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">Δ</text>
      <text x="345" y="61" font-size="14" font-weight="700" fill="#8e5a18">检测</text>
    </g>

    <g transform="translate(28 158)">
      <rect x="0" y="0" width="414" height="55" rx="13" fill="#162642"/>
      <circle cx="28" cy="27" r="10" fill="#33b889"/>
      <text x="49" y="23" font-size="13" font-weight="700" fill="#ffffff">候选聚类 · 独立复现 · 证据归档</text>
