    <path d="M74 22 L119 39 V88 C119 122 101 151 74 169 C47 151 29 122 29 88 V39 Z" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.95"/>
    <path d="M48 68 H100 M74 68 V128 M50 128 H98" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g class="ui" transform="translate(250 75)">
