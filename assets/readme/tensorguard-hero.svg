    <text x="2" y="93" font-size="22" font-weight="600" fill="#315b9d">深度学习框架智能模糊测试与缺陷验证平台</text>
    <text x="2" y="131" font-size="17" fill="#61708c">LLM-guided framework fuzzing · differential oracle · reproducible evidence</text>

    <g transform="translate(0 160)">
      <rect x="0" y="0" width="150" height="64" rx="13" fill="#ffffff" stroke="#cfdef7"/>
      <text x="18" y="25" font-size="13" font-weight="700" fill="#6b7a94">API COVERAGE</text>
      <text x="18" y="50" font-size="25" font-weight="800" fill="#2563eb">4,608</text>

      <rect x="164" y="0" width="150" height="64" rx="13" fill="#ffffff" stroke="#d8d1f7"/>
      <text x="182" y="25" font-size="13" font-weight="700" fill="#6b7a94">FRAMEWORKS</text>
      <text x="182" y="50" font-size="25" font-weight="800" fill="#6548d8">2</text>

      <rect x="328" y="0" width="178" height="64" rx="13" fill="#ffffff" stroke="#cbe9df"/>
      <text x="346" y="25" font-size="13" font-weight="700" fill="#6b7a94">REPRO EVIDENCE</text>
      <text x="346" y="50" font-size="25" font-weight="800" fill="#148265">14</text>
    </g>
