<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">TensorGuard</title>
  <desc id="desc">基于大语言模型的深度学习框架智能模糊测试与缺陷验证平台</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faff"/>
      <stop offset="0.58" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f5f1ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#6047d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#274776" flood-opacity="0.13"/>
    </filter>
    <style>
      .ui { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect x="1" y="1" width="1398" height="358" rx="28" fill="url(#heroBg)" stroke="#d9e4f5" stroke-width="2"/>
  <path d="M0 278 C270 225 470 342 730 285 C990 229 1138 255 1400 196 L1400 360 L0 360 Z" fill="#ffffff" opacity="0.64"/>

  <g transform="translate(70 68)" filter="url(#shadow)">
