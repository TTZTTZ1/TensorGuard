<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="790" viewBox="0 0 1400 790" role="img" aria-labelledby="title desc">
  <title id="title">TensorGuard 技术路线</title>
  <desc id="desc">从 API 约束知识构建到种子生成、进化变异、差分检测与证据归档的完整技术路线</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#24436f" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#8297ba"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#1f9c80"/>
    </marker>
    <style>
      .ui { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .step-title { font-size: 18px; font-weight: 800; fill: #16233d; }
      .step-copy { font-size: 13px; fill: #62718d; }
      .step-num { font-size: 15px; font-weight: 800; fill: #ffffff; }
      .tag { font-size: 12px; font-weight: 800; letter-spacing: 0; }
    </style>
  </defs>

  <rect x="1" y="1" width="1398" height="788" rx="24" fill="#f8fbff" stroke="#dce6f4" stroke-width="2"/>
  <g class="ui">
    <text x="48" y="48" font-size="27" font-weight="800" fill="#14213d">TensorGuard 技术路线</text>
    <text x="48" y="77" font-size="14" fill="#6b7890">约束知识构建与在线智能模糊测试协同，最终形成可复现、可追踪的缺陷证据</text>

    <g transform="translate(1020 28)">
      <rect x="0" y="0" width="142" height="32" rx="16" fill="#eaf2ff"/>
      <circle cx="18" cy="16" r="6" fill="#356fe6"/>
      <text x="32" y="21" class="tag" fill="#315eaf">离线知识构建</text>
      <rect x="154" y="0" width="154" height="32" rx="16" fill="#eaf9f5"/>
      <circle cx="172" cy="16" r="6" fill="#1f9c80"/>
      <text x="186" y="21" class="tag" fill="#17705f">在线测试链路</text>
    </g>

    <rect x="35" y="103" width="754" height="190" rx="22" fill="#f2f7ff" stroke="#9fbcf1" stroke-width="2" stroke-dasharray="7 6"/>
    <rect x="54" y="88" width="172" height="31" rx="15" fill="#356fe6"/>
    <text x="140" y="109" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">OFFLINE · 约束知识层</text>

    <rect x="803" y="103" width="562" height="190" rx="22" fill="#f0fbf8" stroke="#83cfbc" stroke-width="2" stroke-dasharray="7 6"/>
    <rect x="822" y="88" width="176" height="31" rx="15" fill="#1f9c80"/>
    <text x="910" y="109" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">ONLINE · 生成与修复</text>

    <!-- top row arrows -->
    <path d="M280 198 H314" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M536 198 H570" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M792 198 H826" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M1048 198 H1082" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- step 1 -->
    <g transform="translate(50 133)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#bcd1f5"/>
      <circle cx="28" cy="28" r="18" fill="#356fe6"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">01</text>
      <rect x="174" y="15" width="38" height="27" rx="8" fill="#e9f1ff"/>
      <text x="193" y="33" text-anchor="middle" font-size="12" font-weight="800" fill="#356fe6">API</text>
      <text x="20" y="73" class="step-title">API 文档与清单</text>
      <text x="20" y="98" class="step-copy">签名、语义说明与示例</text>
      <text x="20" y="118" class="step-copy">PyTorch · TensorFlow</text>
    </g>

    <!-- step 2 -->
    <g transform="translate(306 133)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#c5c0f2"/>
      <circle cx="28" cy="28" r="18" fill="#6c52d9"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">02</text>
      <rect x="174" y="15" width="38" height="27" rx="8" fill="#f0edff"/>
      <text x="193" y="33" text-anchor="middle" font-size="12" font-weight="800" fill="#6c52d9">LLM</text>
      <text x="20" y="73" class="step-title">结构化约束蒸馏</text>
      <text x="20" y="98" class="step-copy">DeepSeek 离线提取</text>
      <text x="20" y="118" class="step-copy">shape · dtype · 跨参数关系</text>
    </g>

    <!-- step 3 -->
    <g transform="translate(562 133)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#bcd1f5"/>
      <circle cx="28" cy="28" r="18" fill="#356fe6"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">03</text>
      <rect x="174" y="15" width="38" height="27" rx="8" fill="#e9f1ff"/>
      <path d="M183 22 H203 V36 H183 Z M187 26 H199 M187 30 H199 M187 34 H196" fill="none" stroke="#356fe6" stroke-width="1.6"/>
      <text x="20" y="73" class="step-title">结构化约束库</text>
      <text x="20" y="98" class="step-copy">按 API 全限定名索引</text>
      <text x="20" y="118" class="step-copy">可校验 · 可复用 · 可续作</text>
    </g>

    <!-- step 4 -->
    <g transform="translate(818 133)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#a7dfd2"/>
      <circle cx="28" cy="28" r="18" fill="#1f9c80"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">04</text>
      <rect x="174" y="15" width="38" height="27" rx="8" fill="#e5f7f2"/>
      <text x="193" y="33" text-anchor="middle" font-size="12" font-weight="800" fill="#1f8b74">P</text>
      <text x="20" y="73" class="step-title">约束 Prompt 构建</text>
      <text x="20" y="98" class="step-copy">任务分解 + 完整签名</text>
      <text x="20" y="118" class="step-copy">显式注入结构化约束</text>
    </g>

    <!-- step 5 -->
    <g transform="translate(1074 133)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#a7dfd2"/>
      <circle cx="28" cy="28" r="18" fill="#1f9c80"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">05</text>
      <rect x="167" y="15" width="45" height="27" rx="8" fill="#e5f7f2"/>
      <text x="189.5" y="33" text-anchor="middle" font-size="11" font-weight="800" fill="#1f8b74">QWEN</text>
      <text x="20" y="73" class="step-title">Qwen 种子生成</text>
      <text x="20" y="98" class="step-copy">自包含 Python 测试程序</text>
      <text x="20" y="118" class="step-copy">目标 API 命中检查</text>
    </g>

    <!-- bend from row one to row two -->
    <path d="M1189 263 V315" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="35" y="315" width="1330" height="196" rx="22" fill="#ffffff" stroke="#d7e3f2" stroke-width="2"/>
    <rect x="54" y="300" width="200" height="31" rx="15" fill="#162642"/>
    <text x="154" y="321" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">CORE · 智能模糊测试引擎</text>

    <!-- second row arrows, right to left -->
    <path d="M1074 414 H1040" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M818 414 H784" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M562 414 H528" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M306 414 H272" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- step 6 -->
    <g transform="translate(1074 349)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#c5c0f2"/>
      <circle cx="28" cy="28" r="18" fill="#6c52d9"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">06</text>
      <text x="20" y="73" class="step-title">四层程序修复</text>
      <text x="20" y="98" class="step-copy">清洗 · 语法 · 裁剪 · 重生成</text>
      <text x="20" y="118" class="step-copy">超时隔离与安全验证</text>
    </g>

    <!-- step 7 -->
    <g transform="translate(818 349)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#9fdbc9"/>
      <circle cx="28" cy="28" r="18" fill="#168265"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">07</text>
      <text x="20" y="73" class="step-title">有效种子池</text>
      <text x="20" y="98" class="step-copy">质量筛选与适应度排序</text>
      <text x="20" y="118" class="step-copy">自适应重采样补足缺口</text>
    </g>

    <!-- step 8 -->
    <g transform="translate(562 349)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#9fdbc9"/>
      <circle cx="28" cy="28" r="18" fill="#168265"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">08</text>
      <text x="20" y="73" class="step-title">InCoder 进化变异</text>
      <text x="20" y="98" class="step-copy">程序级 mask 与填充</text>
      <text x="20" y="118" class="step-copy">有效变异回灌种子池</text>
    </g>

    <!-- feedback arrow -->
    <path d="M690 341 C690 317 932 317 932 341" fill="none" stroke="#1f9c80" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowGreen)"/>
    <text x="811" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#1f806a">有效变异反馈</text>

    <!-- step 9 -->
    <g transform="translate(306 349)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#efca8f"/>
      <circle cx="28" cy="28" r="18" fill="#d9942c"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">09</text>
      <text x="20" y="73" class="step-title">CPU/GPU 差分检测</text>
      <text x="20" y="98" class="step-copy">状态 · 异常 · 类型 · 数值</text>
      <text x="20" y="118" class="step-copy">无需人工标准答案</text>
    </g>

    <!-- step 10 -->
    <g transform="translate(50 349)" filter="url(#shadow)">
      <rect width="230" height="130" rx="17" fill="#ffffff" stroke="#efb5bd"/>
      <circle cx="28" cy="28" r="18" fill="#d65063"/>
      <text x="28" y="33" text-anchor="middle" class="step-num">10</text>
      <text x="20" y="73" class="step-title">候选缺陷归集</text>
      <text x="20" y="98" class="step-copy">错误特征聚类与噪声过滤</text>
      <text x="20" y="118" class="step-copy">保留代表源码与完整日志</text>
    </g>

    <path d="M165 479 V552" stroke="#8297ba" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- evidence lane -->
    <rect x="35" y="552" width="1330" height="190" rx="22" fill="#fff9fa" stroke="#efc5cc" stroke-width="2"/>
    <rect x="54" y="537" width="208" height="31" rx="15" fill="#d65063"/>
    <text x="158" y="558" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">EVIDENCE · 人工复核闭环</text>

    <g transform="translate(66 594)">
      <rect x="0" y="0" width="236" height="104" rx="16" fill="#ffffff" stroke="#e8b7c0"/>
      <rect x="18" y="18" width="40" height="40" rx="11" fill="#fff0f2"/>
      <text x="38" y="45" text-anchor="middle" font-size="17" font-weight="900" fill="#d65063">C</text>
      <text x="75" y="36" font-size="17" font-weight="800" fill="#16233d">候选审核</text>
      <text x="75" y="59" font-size="13" fill="#6b7890">按 API / 错误簇筛选</text>
      <text x="18" y="86" font-size="12" fill="#8a6070">源码 · 日志 · 环境快照</text>

      <path d="M247 52 H285" stroke="#b98490" stroke-width="3" marker-end="url(#arrow)"/>

      <rect x="296" y="0" width="236" height="104" rx="16" fill="#ffffff" stroke="#e8b7c0"/>
      <rect x="314" y="18" width="40" height="40" rx="11" fill="#fff0f2"/>
      <text x="334" y="45" text-anchor="middle" font-size="17" font-weight="900" fill="#d65063">M</text>
      <text x="371" y="36" font-size="17" font-weight="800" fill="#16233d">人工最小化</text>
      <text x="371" y="59" font-size="13" fill="#6b7890">剥离无关语句和噪声</text>
      <text x="314" y="86" font-size="12" fill="#8a6070">得到最小复现程序</text>

      <path d="M543 52 H581" stroke="#b98490" stroke-width="3" marker-end="url(#arrow)"/>

      <rect x="592" y="0" width="236" height="104" rx="16" fill="#ffffff" stroke="#e8b7c0"/>
      <rect x="610" y="18" width="40" height="40" rx="11" fill="#fff0f2"/>
      <text x="630" y="45" text-anchor="middle" font-size="17" font-weight="900" fill="#d65063">R</text>
      <text x="667" y="36" font-size="17" font-weight="800" fill="#16233d">独立进程复现</text>
      <text x="667" y="59" font-size="13" fill="#6b7890">CPU / GPU 分别执行</text>
      <text x="610" y="86" font-size="12" fill="#8a6070">核对行为与稳定性</text>

      <path d="M839 52 H877" stroke="#b98490" stroke-width="3" marker-end="url(#arrow)"/>

      <rect x="888" y="0" width="320" height="104" rx="16" fill="#162642" stroke="#162642"/>
      <circle cx="928" cy="38" r="20" fill="#35b68e"/>
      <path d="M918 38 L926 46 L940 29" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="965" y="36" font-size="18" font-weight="800" fill="#ffffff">确认缺陷与证据报告</text>
      <text x="965" y="59" font-size="13" fill="#b9c9df">Bug ID · repro.py · 双端输出</text>
      <text x="912" y="86" font-size="12" fill="#7ee0c0">可复现 · 可追踪 · 可核验</text>
    </g>

    <rect x="1020" y="752" width="345" height="24" rx="12" fill="#eaf2ff"/>
    <text x="1192.5" y="769" text-anchor="middle" font-size="11" font-weight="700" fill="#315eaf">Web 工作台贯穿任务编排、实时观测、审核与归档</text>
  </g>
</svg>
